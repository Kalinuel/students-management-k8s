apiVersion: v1
kind: Namespace
metadata:
  name: student-management

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: st-management
  namespace: student-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: st-management
  template:
    metadata:
      labels:
        app: st-management
    spec:
      containers:
      - name: st-management
        image: nginx:latest
        imagePullPolicy: IfNotPresent   
        volumeMounts:
        - mountPath: /data
          name: my-storage
        envFrom:
        - configMapRef:
            name: student-config
        - secretRef:
            name: student-secret
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: my-storage
        persistentVolumeClaim:
          claimName: st-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: management-service
  namespace: student-management
spec:
  selector:
    app: st-management
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: st-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: /data/st-pv

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: st-pvc
  namespace: student-management
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: student-config
  namespace: student-management
data:
  APP_NAME: "Student Management System"
  APP_ENV: "production"
  APP_PORT: "8080"
  DB_HOST: "db-service"
  DB_NAME: "studentdb"

---
apiVersion: v1
kind: Secret
metadata:
  name: student-secret
  namespace: student-management
type: Opaque
data:
  PSWD: bmV3IHBhc3N3b3Jk
  PASS_KEY: bmV3IHBhc3N3b3Jk

---
apiVersion: batch/v1
kind: CronJob
metadata: 
  name: cronme
  namespace: student-management
spec:
  schedule: "0 8 * * 1"
  jobTemplate:
    spec:
      template:
        spec: 
          containers: 
          - name: cronme
            image: nginx:latest
            imagePullPolicy: Never
            command:
            - /bin/sh
            - -c 
            - |
              echo "======================================="
              echo "STUDENT REPORT - $(date)"
              echo "======================================="
              echo "Department: Computer Science"
              echo "Total Students: 150"
              echo "Active: 142"
              echo "Graduated: 112"
              echo "========================================"
              echo "Report generated successfully!"
          restartPolicy: Never